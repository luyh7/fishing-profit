<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="format-detection" content="telephone=no" />
  <title>轨道编辑器</title>
  <style>
    :root {
      --bg: #070b16;
      --panel: #121a2c;
      --card: #1a243a;
      --line: #3a4d72;
      --accent: #4da3ff;
      --ok: #3ddc84;
      --warn: #ffb020;
      --danger: #ff5d6c;
      --text: #f5f8ff;
      --muted: #a8b8d8;
      --btn-h: 56px;
      --radius: 18px;
      --safe-b: env(safe-area-inset-bottom, 0px);
      --safe-t: env(safe-area-inset-top, 0px);
      --safe-l: env(safe-area-inset-left, 0px);
      --safe-r: env(safe-area-inset-right, 0px);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      overflow: hidden;
      font-size: 18px;
      line-height: 1.4;
    }
    .app {
      height: 100%;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      padding-top: var(--safe-t);
      padding-left: var(--safe-l);
      padding-right: var(--safe-r);
    }

    .top {
      flex: 0 0 auto;
      padding: 14px 16px 12px;
      background: linear-gradient(180deg, #1a2744, var(--panel));
      border-bottom: 1px solid #2a3a58;
    }
    .top-title {
      font-size: 22px;
      font-weight: 800;
      margin: 0 0 12px;
      letter-spacing: 0.5px;
    }
    .map-row {
      display: grid;
      grid-template-columns: 1fr 110px;
      gap: 12px;
    }
    select, button, input {
      font: inherit;
      color: var(--text);
      background: var(--card);
      border: 2px solid var(--line);
      border-radius: 16px;
      min-height: var(--btn-h);
      padding: 0 16px;
    }
    select {
      width: 100%;
      font-size: 18px;
      font-weight: 800;
      appearance: none;
      background-image:
        linear-gradient(45deg, transparent 50%, var(--muted) 50%),
        linear-gradient(135deg, var(--muted) 50%, transparent 50%);
      background-position: calc(100% - 24px) 50%, calc(100% - 16px) 50%;
      background-size: 8px 8px, 8px 8px;
      background-repeat: no-repeat;
      padding-right: 42px;
    }
    button {
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    button:active { transform: scale(0.98); filter: brightness(1.1); }
    button.primary { background: #1a4f8c; border-color: var(--accent); color: #eaf5ff; }
    button.ok { background: #145c38; border-color: var(--ok); color: #e9fff2; }
    button.danger { background: #6a2030; border-color: var(--danger); color: #ffe8eb; }
    button.ghost { background: var(--card); }
    button:disabled { opacity: 0.45; }

    .stage-wrap {
      flex: 1 1 auto;
      min-height: 0;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 50% 28%, #1a2744 0%, transparent 55%),
        #060a14;
      touch-action: none;
      overflow: hidden;
    }
    canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
      touch-action: none;
      box-shadow: 0 10px 32px rgba(0,0,0,.5);
      border-radius: 6px;
    }
    .stage-badge {
      position: absolute;
      left: 12px;
      top: 12px;
      right: 12px;
      background: rgba(10,16,30,.82);
      border: 1px solid #2d3d5e;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 15px;
      font-weight: 800;
      color: var(--muted);
      backdrop-filter: blur(8px);
      pointer-events: none;
      text-align: center;
    }

    .bottom {
      flex: 0 0 auto;
      max-height: 52dvh;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      background: var(--panel);
      border-top: 1px solid #2a3a58;
      padding: 14px 16px calc(16px + var(--safe-b));
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .btn-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .btn-grid .span2 { grid-column: 1 / -1; }
    .section-label {
      font-size: 15px;
      font-weight: 800;
      color: var(--muted);
      letter-spacing: 0.3px;
      margin-bottom: -4px;
    }
    .track-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .chip {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 58px;
      width: 100%;
      padding: 12px 16px;
      border-radius: 16px;
      border: 2px solid #31425f;
      background: var(--card);
      font-size: 17px;
      font-weight: 800;
      text-align: left;
    }
    .chip.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(77,163,255,.28);
      background: #1a3358;
    }
    .chip .dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      flex: 0 0 auto;
    }
    .chip .meta {
      margin-left: auto;
      color: var(--muted);
      font-size: 15px;
      font-weight: 700;
    }
    .preview-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }
    .preview-row label {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 17px;
      font-weight: 700;
      color: var(--muted);
    }
    .preview-row input[type="number"] {
      width: 96px;
      text-align: center;
      font-size: 20px;
      font-weight: 800;
    }
    .export-box {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-all;
      background: #0b1220;
      border: 2px solid #2a3a58;
      border-radius: 16px;
      padding: 14px 16px;
      color: #c5d4ef;
      max-height: 110px;
      overflow: auto;
    }
    .hint {
      font-size: 15px;
      line-height: 1.55;
      color: var(--muted);
    }
    .hint code {
      font-size: 13px;
      background: #0b1220;
      padding: 2px 6px;
      border-radius: 6px;
      color: #c5d4ef;
    }
    .err {
      margin-top: 10px;
      background: #3a1820;
      border: 2px solid var(--danger);
      color: #ffd0d6;
      border-radius: 16px;
      padding: 12px 14px;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.5;
      display: none;
    }
    .err.show { display: block; }
    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(28px + var(--safe-b));
      transform: translateX(-50%);
      background: #123528;
      color: #c8ffdf;
      border: 2px solid var(--ok);
      padding: 14px 18px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 800;
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s;
      z-index: 30;
      max-width: 92vw;
      text-align: center;
      box-shadow: 0 10px 28px rgba(0,0,0,.4);
    }
    .toast.show { opacity: 1; }
    .toast.bad {
      background: #3a1820;
      color: #ffd0d6;
      border-color: var(--danger);
    }
    .empty-tracks {
      color: var(--muted);
      font-size: 16px;
      padding: 10px 4px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <h1 class="top-title">轨道编辑器</h1>
      <div class="map-row">
        <select id="sceneSelect" aria-label="选择地图"></select>
        <button id="btnReload" class="ghost" type="button">刷新</button>
      </div>
      <div class="err" id="errBox"></div>
    </div>

    <div class="stage-wrap" id="stageWrap">
      <div class="stage-badge" id="stageBadge">点图添加控制点 · 拖动圆点</div>
      <canvas id="cv" width="800" height="450"></canvas>
    </div>

    <div class="bottom">
      <div class="btn-grid">
        <button id="btnAddTrack" class="primary" type="button">＋ 新轨道</button>
        <button id="btnDelTrack" class="danger" type="button">删当前轨</button>
        <button id="btnDelPoint" class="ghost" type="button">删末点</button>
        <button id="btnClear" class="ghost" type="button">清空全部</button>
        <button id="btnExport" class="ok span2" type="button">导出文件名到剪贴板</button>
      </div>

      <div class="preview-row">
        <label>预览人数
          <input id="previewN" type="number" min="0" max="64" value="8" inputmode="numeric" />
        </label>
      </div>

      <div class="section-label">轨道列表（点选切换当前轨）</div>
      <div class="track-list" id="trackList"></div>

      <div class="section-label">导出内容</div>
      <div class="export-box" id="exportBox">T@</div>
      <div class="hint">
        格式：<code>T@x,y_x,y+T@...</code> · 无容量 · 按「人数/长度」密度分配 · 轨内等距<br>
        完整文件名：<code>id-名称-T@....png</code>
      </div>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <script>
(function () {
  const COLORS = ["#4da3ff", "#3ddc84", "#ffb020", "#ff6b9d", "#c792ea", "#89ddff", "#f78c6c", "#c3e88d"];
  const cv = document.getElementById("cv");
  const ctx = cv.getContext("2d");
  const stageWrap = document.getElementById("stageWrap");
  const sceneSelect = document.getElementById("sceneSelect");
  const trackList = document.getElementById("trackList");
  const exportBox = document.getElementById("exportBox");
  const toastEl = document.getElementById("toast");
  const errBox = document.getElementById("errBox");
  const previewN = document.getElementById("previewN");
  const stageBadge = document.getElementById("stageBadge");

  let scenes = [];
  let tracks = [{ points: [] }];
  let activeTrack = 0;
  let img = new Image();
  let imgReady = false;
  let naturalW = 800, naturalH = 450;
  let drag = null;
  let cssScale = 1;

  function toast(msg, bad) {
    toastEl.textContent = msg;
    toastEl.classList.toggle("bad", !!bad);
    toastEl.classList.add("show");
    clearTimeout(toast._t);
    toast._t = setTimeout(() => toastEl.classList.remove("show"), 2000);
  }
  function showErr(msg) {
    if (!msg) {
      errBox.classList.remove("show");
      errBox.textContent = "";
      return;
    }
    errBox.textContent = msg;
    errBox.classList.add("show");
  }
  function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }

  function parseLayout(layout) {
    if (!layout || layout.indexOf("@") < 0 || layout.indexOf("T") < 0) return null;
    const segs = layout.split("+");
    const out = [];
    for (const raw of segs) {
      const segment = raw.trim();
      if (!segment.startsWith("T") || segment.indexOf("@") < 0) return null;
      const at = segment.indexOf("@");
      const head = segment.slice(0, at);
      if (head !== "T") {
        if (head.length < 2 || head[0] !== "T" || !/^\d+$/.test(head.slice(1))) return null;
      }
      const pointsRaw = segment.slice(at + 1);
      const pts = [];
      for (const token of pointsRaw.split("_")) {
        if (!token || token.indexOf(",") < 0) return null;
        const [xs, ys] = token.split(",", 2);
        const x = Number(xs), y = Number(ys);
        if (!Number.isFinite(x) || !Number.isFinite(y)) return null;
        pts.push({ x: clamp(x, 0, 100), y: clamp(y, 0, 100) });
      }
      if (!pts.length) return null;
      out.push({ points: pts });
    }
    return out.length ? out : null;
  }

  function fmtNum(n) {
    // 接近整数（误差 ≤0.1）→ 取整；否则保留 1 位小数，缩短文件名
    const nearest = Math.round(n);
    if (Math.abs(n - nearest) <= 0.1) return String(nearest);
    const s = (Math.round(n * 10) / 10).toFixed(1);
    return s.endsWith(".0") ? s.slice(0, -2) : s;
  }
  function exportSuffix() {
    if (!tracks.length) return "";
    const parts = [];
    for (const t of tracks) {
      if (!t.points.length) continue;
      parts.push("T@" + t.points.map(p => `${fmtNum(p.x)},${fmtNum(p.y)}`).join("_"));
    }
    return parts.join("+");
  }
  function updateExportBox() {
    const scene = scenes.find(x => x.filename === sceneSelect.value);
    const suffix = exportSuffix();
    if (!suffix) {
      exportBox.textContent = "(空 — 先添加轨道与控制点)";
      return;
    }
    exportBox.textContent = scene ? `${scene.id}-${scene.name}-${suffix}.png` : suffix;
  }

  function polylineLength(points) {
    let total = 0;
    for (let i = 1; i < points.length; i++) {
      total += Math.hypot(points[i].x - points[i - 1].x, points[i].y - points[i - 1].y);
    }
    return total;
  }
  function pointOnPolyline(points, t) {
    if (!points.length) return { x: 50, y: 50 };
    if (points.length === 1) return { ...points[0] };
    t = clamp(t, 0, 1);
    const total = polylineLength(points);
    if (total <= 1e-9) return { ...points[0] };
    let target = t * total, walked = 0;
    for (let i = 1; i < points.length; i++) {
      const a = points[i - 1], b = points[i];
      const seg = Math.hypot(b.x - a.x, b.y - a.y);
      if (walked + seg >= target || i === points.length - 1) {
        if (seg <= 1e-9) return { ...a };
        const frac = clamp((target - walked) / seg, 0, 1);
        return { x: a.x + (b.x - a.x) * frac, y: a.y + (b.y - a.y) * frac };
      }
      walked += seg;
    }
    return { ...points[points.length - 1] };
  }
  function allocateSlots(count) {
    const n = tracks.length;
    const slots = Array(n).fill(0);
    if (!n || count <= 0) return slots;
    const lengths = tracks.map(t => {
      const L = polylineLength(t.points);
      return L > 1e-9 ? L : 1e-3;
    });
    for (let k = 0; k < count; k++) {
      let best = 0, bestD = slots[0] / lengths[0];
      for (let i = 1; i < n; i++) {
        const d = slots[i] / lengths[i];
        if (d < bestD - 1e-12) { best = i; bestD = d; }
      }
      slots[best]++;
    }
    return slots;
  }

  function resizeCanvas() {
    if (!imgReady) {
      const r = stageWrap.getBoundingClientRect();
      naturalW = Math.max(320, Math.floor(r.width));
      naturalH = Math.max(220, Math.floor(r.height * 0.92));
    } else {
      naturalW = img.naturalWidth || img.width;
      naturalH = img.naturalHeight || img.height;
    }
    const maxW = stageWrap.clientWidth || 360;
    const maxH = stageWrap.clientHeight || 400;
    const scale = Math.min(maxW / naturalW, maxH / naturalH);
    const cssW = Math.max(1, Math.floor(naturalW * scale));
    const cssH = Math.max(1, Math.floor(naturalH * scale));
    const dpr = Math.min(window.devicePixelRatio || 1, 2.5);
    cv.style.width = cssW + "px";
    cv.style.height = cssH + "px";
    cv.width = Math.floor(cssW * dpr);
    cv.height = Math.floor(cssH * dpr);
    cssScale = cssW / naturalW;
    ctx.setTransform(dpr * cssScale, 0, 0, dpr * cssScale, 0, 0);
    draw();
  }

  function pctToPx(p) {
    return { x: (p.x / 100) * naturalW, y: (p.y / 100) * naturalH };
  }
  function clientToPct(clientX, clientY) {
    const rect = cv.getBoundingClientRect();
    return {
      x: clamp(((clientX - rect.left) / rect.width) * 100, 0, 100),
      y: clamp(((clientY - rect.top) / rect.height) * 100, 0, 100),
    };
  }
  function hitTest(clientX, clientY) {
    const rect = cv.getBoundingClientRect();
    const mx = ((clientX - rect.left) / rect.width) * naturalW;
    const my = ((clientY - rect.top) / rect.height) * naturalH;
    // 手机手指更大，命中半径加大
    const r = 26 / Math.max(cssScale, 0.01);
    for (let ti = tracks.length - 1; ti >= 0; ti--) {
      const pts = tracks[ti].points;
      for (let pi = pts.length - 1; pi >= 0; pi--) {
        const p = pctToPx(pts[pi]);
        if (Math.hypot(p.x - mx, p.y - my) <= r) return { ti, pi };
      }
    }
    return null;
  }

  function draw() {
    ctx.clearRect(0, 0, naturalW, naturalH);
    if (imgReady) {
      ctx.drawImage(img, 0, 0, naturalW, naturalH);
    } else {
      ctx.fillStyle = "#121a2c";
      ctx.fillRect(0, 0, naturalW, naturalH);
      ctx.fillStyle = "#9aabca";
      ctx.font = `bold ${Math.max(18, 20 / Math.max(cssScale, 0.5))}px system-ui`;
      ctx.fillText("请选择地图", 18, 40);
    }

    tracks.forEach((t, ti) => {
      const color = COLORS[ti % COLORS.length];
      const pts = t.points.map(pctToPx);
      if (pts.length) {
        ctx.beginPath();
        ctx.moveTo(pts[0].x, pts[0].y);
        for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
        ctx.strokeStyle = color;
        ctx.lineWidth = (ti === activeTrack ? 6 : 3.6) / cssScale;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.globalAlpha = ti === activeTrack ? 1 : 0.72;
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
      pts.forEach((p, pi) => {
        const r = (ti === activeTrack ? 13 : 10) / cssScale;
        ctx.beginPath();
        ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.lineWidth = 2.4 / cssScale;
        ctx.strokeStyle = ti === activeTrack ? "#fff" : "rgba(255,255,255,0.65)";
        ctx.stroke();
        ctx.fillStyle = "#0b1020";
        ctx.font = `bold ${Math.max(12, 14 / cssScale)}px system-ui`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(String(pi + 1), p.x, p.y + 0.5);
      });
    });

    const n = clamp(parseInt(previewN.value || "0", 10) || 0, 0, 64);
    if (n > 0 && tracks.some(t => t.points.length)) {
      const slots = allocateSlots(n);
      tracks.forEach((t, ti) => {
        const count = slots[ti];
        if (!count || !t.points.length) return;
        const color = COLORS[ti % COLORS.length];
        for (let i = 0; i < count; i++) {
          let tt;
          if (t.points.length <= 1) tt = 0;
          else if (count === 1) tt = 0.5;
          else tt = i / (count - 1);
          const p = pctToPx(pointOnPolyline(t.points, tt));
          const s = 1 / cssScale;
          ctx.fillStyle = color;
          ctx.globalAlpha = 0.92;
          ctx.beginPath();
          ctx.arc(p.x, p.y - 14 * s, 6.5 * s, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
          ctx.strokeStyle = "rgba(255,255,255,0.9)";
          ctx.lineWidth = 1.8 * s;
          ctx.beginPath();
          ctx.moveTo(p.x, p.y - 7 * s);
          ctx.lineTo(p.x, p.y + 5 * s);
          ctx.stroke();
        }
      });
    }
  }

  function renderTrackList() {
    trackList.innerHTML = "";
    if (!tracks.length) {
      trackList.innerHTML = `<div class="empty-tracks">还没有轨道</div>`;
      updateExportBox();
      return;
    }
    tracks.forEach((t, i) => {
      const chip = document.createElement("button");
      chip.type = "button";
      chip.className = "chip" + (i === activeTrack ? " active" : "");
      const L = polylineLength(t.points);
      chip.innerHTML =
        `<span class="dot" style="background:${COLORS[i % COLORS.length]}"></span>` +
        `<span>轨道 ${i + 1}</span>` +
        `<span class="meta">${t.points.length} 点 · L${L.toFixed(1)}</span>`;
      chip.onclick = () => {
        activeTrack = i;
        renderTrackList();
        draw();
        stageBadge.textContent = `当前：轨道 ${i + 1} · 点图添加控制点`;
      };
      trackList.appendChild(chip);
    });
    updateExportBox();
  }

  function fillSceneSelect(list, sourceLabel) {
    scenes = list || [];
    sceneSelect.innerHTML = "";
    const ph = document.createElement("option");
    ph.value = "";
    ph.textContent = scenes.length
      ? `选择地图（${scenes.length}${sourceLabel ? " · " + sourceLabel : ""}）`
      : "无场景图";
    sceneSelect.appendChild(ph);
    for (const s of scenes) {
      const opt = document.createElement("option");
      opt.value = s.filename;
      opt.textContent = `${s.id} · ${s.name}`;
      sceneSelect.appendChild(opt);
    }
  }

  async function tryFetchJson(url) {
    const res = await fetch(url, { cache: "no-store" });
    if (!res.ok) {
      const err = new Error(`${url} → HTTP ${res.status}`);
      err.status = res.status;
      throw err;
    }
    return res.json();
  }

  async function loadScenes() {
    showErr("");
    sceneSelect.innerHTML = `<option value="">加载中…</option>`;
    const sources = [
      { url: "/api/scenes", label: "API" },
      { url: "/api/scenes/", label: "API" },
      // 机器人未重启时 /api/scenes 可能 404：用同目录静态清单兜底
      { url: "scenes.json", label: "本地清单" },
      { url: "/_lab/track-editor/scenes.json", label: "本地清单" },
    ];
    const errors = [];
    for (const src of sources) {
      try {
        const data = await tryFetchJson(src.url);
        const list = data.scenes || [];
        fillSceneSelect(list, src.label);
        if (!list.length) {
          showErr("接口成功，但没有可用场景图。");
          return;
        }
        const params = new URLSearchParams(location.search);
        const want = params.get("map") || params.get("id");
        if (want) {
          const hit = list.find(s =>
            String(s.id).toLowerCase() === String(want).toLowerCase() ||
            s.filename.toLowerCase().startsWith(String(want).toLowerCase() + "-")
          );
          if (hit) {
            sceneSelect.value = hit.filename;
            await loadScene(hit);
          }
        }
        if (src.label === "本地清单") {
          showErr("地图列表来自本地清单（/api/scenes 尚未生效）。完整热更新请重启机器人/4159。");
        }
        toast(`已加载 ${list.length} 张地图（${src.label}）`);
        return;
      } catch (e) {
        errors.push(String(e && e.message ? e.message : e));
      }
    }
    sceneSelect.innerHTML = `<option value="">加载失败</option>`;
    showErr(
      "地图列表加载失败。请确认：1) 访问 /_lab/track-editor/index.html；" +
      "2) scenes.json 存在；3) 重启 4159 后 /api/scenes 可用。" +
      (errors.length ? ` 详情：${errors.join(" | ")}` : "")
    );
    toast("地图列表加载失败", true);
  }

  function loadScene(scene) {
    return new Promise((resolve) => {
      imgReady = false;
      img = new Image();
      img.onload = () => {
        imgReady = true;
        naturalW = img.naturalWidth;
        naturalH = img.naturalHeight;
        const parsed = parseLayout(scene.layout || "");
        tracks = parsed
          ? parsed.map(t => ({ points: t.points.map(p => ({ ...p })) }))
          : [{ points: [] }];
        activeTrack = 0;
        renderTrackList();
        resizeCanvas();
        stageBadge.textContent = `${scene.id} · ${scene.name}`;
        // 保留本地清单提示，不在成功加载图时清掉
        resolve();
      };
      img.onerror = () => {
        showErr(`图片加载失败：${scene.url}\n若文件名含 +/@，请确认资源路径可访问。`);
        toast("图片加载失败", true);
        resolve();
      };
      img.src = scene.url;
    });
  }

  sceneSelect.addEventListener("change", async () => {
    const s = scenes.find(x => x.filename === sceneSelect.value);
    if (s) await loadScene(s);
  });
  document.getElementById("btnReload").onclick = () => loadScenes();
  document.getElementById("btnAddTrack").onclick = () => {
    tracks.push({ points: [] });
    activeTrack = tracks.length - 1;
    renderTrackList();
    draw();
    stageBadge.textContent = `当前：轨道 ${activeTrack + 1} · 点图添加控制点`;
  };
  document.getElementById("btnDelTrack").onclick = () => {
    if (!tracks.length) return;
    tracks.splice(activeTrack, 1);
    if (!tracks.length) tracks = [{ points: [] }];
    activeTrack = Math.max(0, Math.min(activeTrack, tracks.length - 1));
    renderTrackList();
    draw();
  };
  document.getElementById("btnDelPoint").onclick = () => {
    const t = tracks[activeTrack];
    if (!t || !t.points.length) return;
    t.points.pop();
    renderTrackList();
    draw();
  };
  document.getElementById("btnClear").onclick = () => {
    if (!confirm("清空全部轨道？")) return;
    tracks = [{ points: [] }];
    activeTrack = 0;
    renderTrackList();
    draw();
  };
  document.getElementById("btnExport").onclick = async () => {
    const suffix = exportSuffix();
    if (!suffix) { toast("没有可导出的轨道", true); return; }
    const scene = scenes.find(x => x.filename === sceneSelect.value);
    const full = scene ? `${scene.id}-${scene.name}-${suffix}.png` : suffix;
    try {
      await navigator.clipboard.writeText(full);
      toast("已复制文件名");
    } catch {
      const ta = document.createElement("textarea");
      ta.value = full;
      ta.style.position = "fixed";
      ta.style.left = "-9999px";
      document.body.appendChild(ta);
      ta.select();
      try {
        document.execCommand("copy");
        toast("已复制文件名");
      } catch {
        toast("复制失败，请长按下方文本手动复制", true);
      }
      ta.remove();
    }
    exportBox.textContent = full;
  };
  previewN.addEventListener("input", draw);

  function onPointerDown(e) {
    e.preventDefault();
    const hit = hitTest(e.clientX, e.clientY);
    if (hit) {
      drag = hit;
      activeTrack = hit.ti;
      renderTrackList();
      try { cv.setPointerCapture(e.pointerId); } catch (_) {}
      return;
    }
    if (!tracks.length) tracks = [{ points: [] }];
    if (activeTrack < 0 || activeTrack >= tracks.length) activeTrack = 0;
    tracks[activeTrack].points.push(clientToPct(e.clientX, e.clientY));
    renderTrackList();
    draw();
  }
  function onPointerMove(e) {
    if (!drag) return;
    e.preventDefault();
    tracks[drag.ti].points[drag.pi] = clientToPct(e.clientX, e.clientY);
    updateExportBox();
    draw();
  }
  function onPointerUp() {
    if (!drag) return;
    drag = null;
    renderTrackList();
    draw();
  }

  cv.addEventListener("pointerdown", onPointerDown, { passive: false });
  cv.addEventListener("pointermove", onPointerMove, { passive: false });
  cv.addEventListener("pointerup", onPointerUp);
  cv.addEventListener("pointercancel", onPointerUp);
  window.addEventListener("resize", resizeCanvas);

  renderTrackList();
  resizeCanvas();
  loadScenes();
})();
  </script>
</body>
</html>
