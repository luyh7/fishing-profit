<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>钓鱼收益计算器</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0e1118;
        --panel: rgba(16, 20, 30, 0.86);
        --line: rgba(255, 255, 255, 0.09);
        --text: #edf2ff;
        --muted: #98a5be;
        --accent: #7dd3fc;
        --good: #7ee081;
        --bad: #ff7c91;
        --shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(
            circle at top left,
            rgba(56, 189, 248, 0.2),
            transparent 28%
          ),
          radial-gradient(
            circle at top right,
            rgba(126, 224, 129, 0.12),
            transparent 24%
          ),
          linear-gradient(160deg, #0b1020 0%, #111726 52%, #090d16 100%);
        color: var(--text);
        font-family:
          "Microsoft YaHei UI", "PingFang SC", "Noto Sans SC", sans-serif;
      }

      .page {
        width: min(1320px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 28px 0 40px;
      }

      .hero {
        display: grid;
        grid-template-columns: clamp(260px, 26vw, 340px) minmax(0, 1fr);
        gap: 18px;
        margin-bottom: 18px;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
        border-radius: 22px;
      }

      .hero-copy,
      .panel,
      .section {
        padding: 24px;
      }

      .hero-copy {
        padding: clamp(14px, 1.6vw, 24px);
      }

      .hero-params {
        padding: clamp(12px, 1.4vw, 18px);
      }

      .hero-params .panel-head h2 {
        font-size: clamp(14px, 1.1vw, 18px);
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--accent);
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-bottom: 14px;
      }

      .version-badge {
        display: inline-flex;
        align-items: center;
        padding: 3px 8px;
        border-radius: 999px;
        background: rgba(125, 211, 252, 0.12);
        border: 1px solid rgba(125, 211, 252, 0.28);
        color: var(--text);
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0;
        text-transform: none;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        font-size: clamp(24px, 2.4vw, 40px);
        line-height: 1.1;
        margin-bottom: 10px;
        word-break: break-word;
      }

      .subtitle,
      .helper,
      .muted,
      .small,
      .table-note {
        color: var(--muted);
      }

      .subtitle {
        line-height: 1.75;
        max-width: 68ch;
      }

      .hero-metrics,
      .summary,
      .map-grid {
        display: grid;
        gap: 12px;
      }

      .hero-metrics,
      .summary {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        margin-top: 20px;
      }

      .summary {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .map-grid {
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        margin-top: 12px;
        gap: 10px;
      }

      .metric,
      .summary-card,
      .map-card {
        padding: 14px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      .metric-label,
      .summary-card .label,
      .map-card .label,
      .field label {
        color: var(--muted);
        font-size: 12px;
      }

      .selected-map-delta {
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        justify-content: flex-start;
        gap: 4px 12px;
      }

      .selected-map-delta-item {
        display: inline-flex;
        align-items: baseline;
        min-width: 0;
        gap: 4px;
      }

      .selected-map-delta-label {
        white-space: nowrap;
      }

      .metric-value,
      .summary-card .value,
      .map-card .value {
        font-size: 22px;
        font-weight: 700;
        margin-top: 8px;
      }

      .metric-note,
      .summary-card .small,
      .map-card .small {
        margin-top: 6px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .rarity-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px 10px;
        margin-top: 8px;
      }

      .rarity-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: var(--muted);
        line-height: 1.4;
      }

      .rarity-chip::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--rarity-color, #888);
        flex-shrink: 0;
      }

      .rarity-chip[data-rarity="UR"] {
        --rarity-color: #ff4d1a;
      }
      .rarity-chip[data-rarity="SSR"] {
        --rarity-color: #ffcc00;
      }
      .rarity-chip[data-rarity="SR"] {
        --rarity-color: #a44bff;
      }
      .rarity-chip[data-rarity="R"] {
        --rarity-color: #3b82f6;
      }
      .rarity-chip[data-rarity="N"] {
        --rarity-color: #9ca3af;
      }

      .has-tooltip {
        position: relative;
      }

      .tooltip {
        position: absolute;
        right: 0;
        top: calc(100% + 8px);
        z-index: 20;
        width: min(200px, calc(100vw - 24px));
        padding: 12px 14px;
        border-radius: 14px;
        background: rgba(15, 18, 26, 0.96);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(12px);
        overflow: hidden;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.15s ease;
        font-size: 12px;
        line-height: 1.5;
      }

      .tooltip[hidden] {
        display: none;
      }

      .has-tooltip:hover .tooltip,
      .has-tooltip:focus-within .tooltip {
        opacity: 1;
      }

      .tooltip-title {
        color: var(--muted);
        font-size: 11px;
        margin-bottom: 6px;
      }

      .tooltip-table {
        width: 100%;
        min-width: 0;
        table-layout: fixed;
        border-collapse: collapse;
      }

      .tooltip-table th,
      .tooltip-table td {
        padding: 4px 6px;
        text-align: right;
        font-size: 12px;
        white-space: normal;
        overflow-wrap: anywhere;
      }

      .tooltip-table th:first-child,
      .tooltip-table td:first-child {
        text-align: left;
        padding-left: 0;
        width: 34%;
      }

      .tooltip-table th:last-child,
      .tooltip-table td:last-child {
        padding-right: 0;
      }

      .tooltip-table thead th {
        color: var(--muted);
        font-weight: 500;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      .tooltip-table tbody tr + tr td {
        border-top: 1px solid rgba(255, 255, 255, 0.04);
      }

      .tooltip-rarity {
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }

      .tooltip-rarity::before {
        content: "";
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--rarity-color, #888);
      }

      .map-card {
        width: 100%;
        text-align: left;
        cursor: pointer;
        min-height: 0;
        transition:
          transform 0.18s ease,
          border-color 0.18s ease,
          background 0.18s ease;
      }

      .map-card:hover {
        transform: translateY(-1px);
        border-color: rgba(125, 211, 252, 0.4);
      }

      .map-card.unavailable {
        cursor: not-allowed;
        opacity: 0.62;
        pointer-events: none;
        filter: saturate(0.75);
      }

      .map-card.unavailable:hover {
        transform: none;
        border-color: rgba(255, 255, 255, 0.06);
      }

      .map-card.selected {
        background: linear-gradient(
          135deg,
          rgba(125, 211, 252, 0.16),
          rgba(126, 224, 129, 0.1)
        );
        border-color: rgba(125, 211, 252, 0.55);
      }

      .map-card.best .map-card-price {
        color: var(--good);
      }

      .map-card-badges {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        align-self: center;
        flex-shrink: 0;
      }

      .map-card-weather {
        display: inline-flex;
        align-items: center;
        gap: 2px;
        min-height: 23px;
        padding: 1px 4px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        line-height: 1;
        position: relative;
      }

      .map-card-weather.is-expired {
        border-color: rgba(248, 113, 113, 0.95);
        box-shadow:
          0 0 0 1px rgba(248, 113, 113, 0.55),
          0 0 0 3px rgba(248, 113, 113, 0.12);
      }

      .map-card-weather .tooltip {
        right: 0;
        left: auto;
        min-width: 0;
      }

      .weather-step-btn {
        width: 15px;
        height: 15px;
        border: none;
        border-radius: 999px;
        background: transparent;
        color: var(--muted);
        font-size: 12px;
        line-height: 1;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        transition:
          background 0.15s ease,
          color 0.15s ease;
      }

      .weather-step-btn:hover {
        background: rgba(125, 211, 252, 0.16);
        color: var(--text);
      }

      .weather-step-btn:focus-visible {
        outline: 2px solid rgba(125, 211, 252, 0.7);
        outline-offset: 2px;
      }

      .weather-emoji {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 15px;
        font-size: 13px;
      }

      .map-card-badges .badge {
        margin-left: 0;
      }

      .badge,
      .badge-best,
      .best-row .badge {
        background: rgba(250, 204, 21, 0.15);
        color: #fbbf24;
        font-size: 11px;
        font-weight: 600;
      }

      .map-card-buff {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-top: 6px;
        color: var(--muted);
        font-size: 11px;
      }

      .map-card-buff-stepper {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: rgba(8, 11, 18, 0.9);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        padding: 2px;
      }

      .map-card-buff-stepper .stepper-btn {
        width: 22px;
        height: 22px;
        border-radius: 7px;
        border: none;
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        font-size: 13px;
        line-height: 1;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s ease;
      }

      .map-card-buff-stepper .stepper-btn:hover {
        background: rgba(125, 211, 252, 0.22);
      }

      .map-card-buff-stepper .stepper-btn:active {
        background: rgba(125, 211, 252, 0.34);
      }

      .map-card-buff-stepper .stepper-value {
        min-width: 36px;
        text-align: center;
        display: inline-block;
        font-size: 14px;
        font-weight: 900;
        color: var(--text);
        font-variant-numeric: tabular-nums;
        line-height: 1;
      }

      .map-card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }

      .map-card-title {
        display: flex;
        align-items: center;
        flex-wrap: nowrap;
        min-width: 0;
        font-size: 14px;
        font-weight: 700;
        line-height: 1.35;
      }

      .map-card-code {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        margin-right: 8px;
        width: 26px;
        height: 26px;
        padding: 0;
        border-radius: 4px;
        background: rgba(185, 229, 255, 0.62);
        border: 1px solid rgba(205, 236, 255, 0.72);
        color: var(--text);
        font-size: 14px;
        font-weight: 900;
        line-height: 1;
        letter-spacing: 0;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.22);
      }

      .map-card.selected:not(.best) .map-card-code {
        background: rgba(125, 211, 252, 0.98);
        border-color: rgba(180, 233, 255, 0.9);
        color: #0f172a;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.18);
      }

      .map-card.best .map-card-code {
        background: rgba(126, 224, 129, 0.98);
        border-color: rgba(177, 244, 181, 0.9);
        color: #0f172a;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.18);
      }

      .map-card-price {
        font-size: 18px;
        font-weight: 700;
        margin-top: 10px;
      }

      .map-card.best .map-card-price {
        color: inherit;
      }

      .map-card-note {
        margin-top: 4px;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.4;
      }

      .map-card-unavailable {
        margin-top: 10px;
        color: #ffd5dc;
        font-size: 12px;
        font-weight: 600;
      }

      .selected-map-delta-value {
        font-size: 1.15em;
        font-weight: 800;
        color: var(--text);
      }

      .selected-map-buff-value {
        font-size: 14px;
        font-weight: 900;
        color: var(--text);
        font-variant-numeric: tabular-nums;
      }

      .selected-best-net {
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        justify-content: flex-start;
        gap: 4px 18px;
      }

      .selected-best-net-item {
        display: inline-flex;
        align-items: baseline;
        gap: 4px;
        min-width: 0;
      }

      .selected-best-net-value {
        font-size: 14px;
        font-weight: 900;
        color: var(--text);
        font-variant-numeric: tabular-nums;
      }

      .map-card-best-bait {
        color: rgba(245, 251, 255, 0.8);
      }

      .map-card-compact {
        display: grid;
        gap: 6px;
      }

      .title-row,
      .panel-head,
      .section-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 14px;
      }

      .title-row h2,
      .panel-head h2,
      .section-head h2 {
        font-size: 18px;
        flex: 0 0 auto;
        white-space: nowrap;
      }

      .panel-head-actions {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
        min-width: 0;
      }

      .refresh-nest-buff-actions {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        flex: 0 0 auto;
        justify-self: end;
      }

      .refresh-nest-buff-statuses {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 6px 8px;
        align-items: center;
        justify-content: flex-start;
        min-width: 0;
        max-width: 100%;
        overflow: hidden;
      }

      .refresh-nest-buff-status {
        width: auto;
        min-width: 0;
        max-width: min(320px, 100%);
        padding: 4px 10px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.02);
        border-radius: 999px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
        box-shadow: none;
        text-align: left;
        white-space: normal;
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      .refresh-nest-buff-status.success {
        border-color: rgba(126, 224, 129, 0.22);
        background: rgba(126, 224, 129, 0.06);
        color: var(--good);
      }

      .refresh-nest-buff-status.error {
        border-color: rgba(255, 124, 145, 0.22);
        background: rgba(255, 124, 145, 0.06);
        color: #ffb8c2;
      }

      .refresh-nest-buff-status[hidden] {
        display: none;
      }

      .refresh-nest-buff-actions-row {
        align-items: center;
        gap: 10px;
      }

      .auto-nest-buff-switch {
        position: relative;
        display: inline-flex;
        align-items: center;
        gap: 9px;
        border: 1px solid rgba(125, 211, 252, 0.28);
        background: linear-gradient(
          135deg,
          rgba(125, 211, 252, 0.18),
          rgba(255, 255, 255, 0.05)
        );
        color: var(--text);
        border-radius: 999px;
        padding: 8px 12px 8px 9px;
        font: inherit;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        transition:
          transform 0.15s ease,
          border-color 0.15s ease,
          background 0.15s ease,
          opacity 0.15s ease;
        user-select: none;
      }

      .auto-nest-buff-switch:hover {
        transform: translateY(-1px);
        border-color: rgba(125, 211, 252, 0.48);
        background: linear-gradient(
          135deg,
          rgba(125, 211, 252, 0.24),
          rgba(255, 255, 255, 0.08)
        );
      }

      .auto-nest-buff-switch:active {
        transform: translateY(0);
      }

      .auto-nest-buff-switch.is-loading {
        opacity: 0.82;
      }

      .auto-nest-buff-switch input {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        margin: 0;
        opacity: 0;
        cursor: pointer;
      }

      .auto-nest-buff-switch-track {
        position: relative;
        flex: 0 0 auto;
        width: 34px;
        height: 20px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.16);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
        transition:
          background 0.15s ease,
          box-shadow 0.15s ease;
      }

      .auto-nest-buff-switch-track::after {
        content: "";
        position: absolute;
        top: 3px;
        left: 3px;
        width: 14px;
        height: 14px;
        border-radius: 999px;
        background: #fff;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.28);
        transition: transform 0.15s ease;
      }

      .auto-nest-buff-switch input:checked + .auto-nest-buff-switch-track {
        background: rgba(126, 224, 129, 0.48);
        box-shadow: inset 0 0 0 1px rgba(126, 224, 129, 0.26);
      }

      .auto-nest-buff-switch
        input:checked
        + .auto-nest-buff-switch-track::after {
        transform: translateX(14px);
      }

      .auto-nest-buff-switch
        input:focus-visible
        + .auto-nest-buff-switch-track {
        outline: 2px solid rgba(125, 211, 252, 0.7);
        outline-offset: 2px;
      }

      .auto-nest-buff-switch-text {
        white-space: nowrap;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border-radius: 999px;
        background: rgba(125, 211, 252, 0.1);
        color: var(--accent);
        padding: 8px 12px;
        font-size: 12px;
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .field.full {
        grid-column: 1 / -1;
      }

      .field input,
      .field select {
        width: 100%;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(8, 11, 18, 0.9);
        color: var(--text);
        padding: 13px 14px;
        outline: none;
      }

      .field input:focus,
      .field select:focus {
        border-color: rgba(125, 211, 252, 0.85);
      }

      .helper {
        margin-top: 12px;
        font-size: 12px;
        line-height: 1.55;
      }

      .table-card {
        margin-top: 18px;
        padding: 0;
        overflow: hidden;
      }

      .table-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 20px 22px 14px;
      }

      .table-head h2 {
        font-size: 18px;
        margin-bottom: 6px;
      }

      .table-wrap {
        overflow: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 1120px;
      }

      thead th {
        position: sticky;
        top: 0;
        background: rgba(18, 22, 32, 0.98);
        color: #c9d4ea;
        text-align: left;
        font-size: 12px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        padding: 14px 16px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.09);
      }

      tbody td {
        padding: 15px 16px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }

      tbody tr:hover {
        background: rgba(255, 255, 255, 0.03);
      }

      td.net {
        color: var(--good);
        font-weight: 700;
      }

      .best-row {
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.1),
          rgba(183, 232, 255, 0.12)
        );
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.12),
          inset 0 -1px 0 rgba(255, 255, 255, 0.08);
      }

      .disabled-row {
        opacity: 0.55;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        padding: 4px 8px;
        border-radius: 999px;
        margin-left: 8px;
        background: rgba(255, 255, 255, 0.16);
        color: #f5fbff;
        font-size: 11px;
      }

      .best-row .badge {
        background: rgba(255, 255, 255, 0.22);
        color: #f5fbff;
      }

      .best-net {
        color: #f5fbff;
        font-weight: 800;
      }

      .bad {
        color: var(--bad);
      }

      .empty-state {
        padding: 24px 22px 28px;
        color: var(--muted);
      }

      @media (max-width: 820px) {
        .hero,
        .hero-metrics,
        .controls {
          grid-template-columns: 1fr;
        }

        .page {
          width: min(100vw - 20px, 1320px);
          padding-top: 16px;
        }

        .hero-copy,
        .panel,
        .section {
          padding: 18px;
        }

        .table-head {
          padding: 18px 18px 12px;
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <article class="card hero-copy">
          <div class="eyebrow">
            Fishing Calculator
            <span class="version-badge" id="versionBadge">v1.1.5</span>
          </div>
          <h1>钓鱼收益计算器</h1>

          <div class="panel hero-params" style="margin-top: 18px">
            <div class="panel-head">
              <h2>原始计算参数</h2>
            </div>

            <div class="controls">
              <div class="field full">
                <label for="hookLevel">鱼钩等级</label>
                <select id="hookLevel"></select>
              </div>
              <div class="field full">
                <label for="rodLevel">鱼竿等级</label>
                <select id="rodLevel"></select>
              </div>
              <div class="field full">
                <label for="systemBuff">系统 buff</label>
                <select id="systemBuff"></select>
              </div>
            </div>
          </div>
        </article>

        <aside class="card panel">
          <div class="panel-head">
            <h2>地图选择</h2>
            <div class="panel-head-actions">
              <div class="refresh-nest-buff-statuses">
                <div
                  class="refresh-nest-buff-status"
                  id="refreshNestBuffStatus"
                  hidden
                ></div>
                <div
                  class="refresh-nest-buff-status error"
                  id="refreshNestBuffError"
                  hidden
                ></div>
              </div>
              <div class="refresh-nest-buff-actions">
                <label class="auto-nest-buff-switch">
                  <input
                    type="checkbox"
                    id="autoNestBuffSwitch"
                    role="switch"
                    aria-label="自动更新打窝buff"
                  />
                  <span
                    class="auto-nest-buff-switch-track"
                    aria-hidden="true"
                  ></span>
                  <span class="auto-nest-buff-switch-text"
                    >自动更新打窝buff</span
                  >
                </label>
              </div>
            </div>
          </div>
          <div class="map-grid" id="mapCardList"></div>
        </aside>
      </section>

      <section class="summary">
        <article class="summary-card">
          <div class="label">当前地图</div>
          <div class="value" id="selectedMapName">-</div>
          <div class="small" id="selectedMapDelta">-</div>
        </article>
        <article class="summary-card has-tooltip" id="fishPriceCard">
          <div class="label">当前单鱼期望价值</div>
          <div class="value" id="selectedFishPrice">-</div>
          <div class="small" id="selectedMapProbability">-</div>
          <div class="tooltip" id="fishPriceTooltip" hidden></div>
        </article>
        <article class="summary-card">
          <div class="label">当前最优鱼饵</div>
          <div class="value" id="selectedBestBait">-</div>
          <div class="small" id="selectedBestNet">-</div>
        </article>
      </section>

      <section class="card section table-card">
        <div class="table-head">
          <h2>鱼饵收益对比</h2>
          <div class="muted">
            最佳鱼饵：<strong id="bestBaitName">-</strong> / 24h 净收益
            <strong id="bestBaitNet">-</strong>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>鱼饵</th>
                <th>价格</th>
                <th>加速</th>
                <th>钓鱼间隔</th>
                <th>24h 理论次数</th>
                <th>24h 完成次数</th>
                <th>24h 总收益</th>
                <th>24h 鱼饵成本</th>
                <th>24h 净收益</th>
              </tr>
            </thead>
            <tbody id="resultBody"></tbody>
          </table>
        </div>
        <div class="empty-state" id="emptyState" hidden>
          <span>暂无可计算的鱼饵数据，请检查配置文件。</span>
        </div>
      </section>
    </main>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
