<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>钓鱼收益计算器</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0e1118;
        --panel: rgba(16, 20, 30, 0.86);
        --line: rgba(255, 255, 255, 0.09);
        --text: #edf2ff;
        --muted: #98a5be;
        --accent: #7dd3fc;
        --good: #7ee081;
        --bad: #ff7c91;
        --shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(
            circle at top left,
            rgba(56, 189, 248, 0.2),
            transparent 28%
          ),
          radial-gradient(
            circle at top right,
            rgba(126, 224, 129, 0.12),
            transparent 24%
          ),
          linear-gradient(160deg, #0b1020 0%, #111726 52%, #090d16 100%);
        color: var(--text);
        font-family:
          "Microsoft YaHei UI", "PingFang SC", "Noto Sans SC", sans-serif;
      }

      .page {
        width: min(1320px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 28px 0 40px;
      }

      .hero {
        display: grid;
        grid-template-columns: clamp(260px, 26vw, 340px) minmax(0, 1fr);
        gap: 18px;
        margin-bottom: 18px;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
        border-radius: 22px;
      }

      .hero-copy,
      .panel,
      .section {
        padding: 24px;
      }

      .hero-copy {
        padding: clamp(14px, 1.6vw, 24px);
      }

      .hero-params {
        padding: clamp(12px, 1.4vw, 18px);
      }

      .hero-params .panel-head h2 {
        font-size: clamp(14px, 1.1vw, 18px);
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--accent);
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-bottom: 14px;
      }

      .version-badge {
        display: inline-flex;
        align-items: center;
        padding: 3px 8px;
        border-radius: 999px;
        background: rgba(125, 211, 252, 0.12);
        border: 1px solid rgba(125, 211, 252, 0.28);
        color: var(--text);
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0;
        text-transform: none;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        font-size: clamp(24px, 2.4vw, 40px);
        line-height: 1.1;
        margin-bottom: 10px;
        word-break: break-word;
      }

      .subtitle,
      .helper,
      .muted,
      .small,
      .table-note {
        color: var(--muted);
      }

      .subtitle {
        line-height: 1.75;
        max-width: 68ch;
      }

      .hero-metrics,
      .summary,
      .map-grid {
        display: grid;
        gap: 12px;
      }

      .hero-metrics,
      .summary {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        margin-top: 20px;
      }

      .summary {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .map-grid {
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        margin-top: 12px;
        gap: 10px;
      }

      .metric,
      .summary-card,
      .map-card {
        padding: 14px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      .metric-label,
      .summary-card .label,
      .map-card .label,
      .field label {
        color: var(--muted);
        font-size: 12px;
      }

      .selected-map-delta {
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        justify-content: flex-start;
        gap: 4px 12px;
      }

      .selected-map-delta-item {
        display: inline-flex;
        align-items: baseline;
        min-width: 0;
        gap: 4px;
      }

      .selected-map-delta-label {
        white-space: nowrap;
      }

      .metric-value,
      .summary-card .value,
      .map-card .value {
        font-size: 22px;
        font-weight: 700;
        margin-top: 8px;
      }

      .metric-note,
      .summary-card .small,
      .map-card .small {
        margin-top: 6px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .rarity-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px 10px;
        margin-top: 8px;
      }

      .rarity-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: var(--muted);
        line-height: 1.4;
      }

      .rarity-chip::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--rarity-color, #888);
        flex-shrink: 0;
      }

      .rarity-chip[data-rarity="UR"] {
        --rarity-color: #ff4d1a;
      }
      .rarity-chip[data-rarity="UTR"] {
        --rarity-color: #ff3b30;
      }
      .rarity-chip[data-rarity="SSR"] {
        --rarity-color: #ffcc00;
      }
      .rarity-chip[data-rarity="SR"] {
        --rarity-color: #a44bff;
      }
      .rarity-chip[data-rarity="R"] {
        --rarity-color: #3b82f6;
      }
      .rarity-chip[data-rarity="N"] {
        --rarity-color: #9ca3af;
      }

      .has-tooltip {
        position: relative;
      }

      .tooltip {
        position: absolute;
        right: 0;
        top: calc(100% + 8px);
        z-index: 20;
        width: min(200px, calc(100vw - 24px));
        padding: 12px 14px;
        border-radius: 14px;
        background: rgba(15, 18, 26, 0.96);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(12px);
        overflow: hidden;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.15s ease;
        font-size: 12px;
        line-height: 1.5;
      }

      #fishPriceTooltip {
        left: -14px;
        right: -14px;
        width: auto;
        max-width: none;
        box-sizing: border-box;
      }

      .tooltip[hidden] {
        display: none;
      }

      .has-tooltip:hover .tooltip,
      .has-tooltip:focus-within .tooltip {
        opacity: 1;
      }

      .tooltip-title {
        color: var(--muted);
        font-size: 11px;
        margin-bottom: 6px;
      }

      .tooltip-table {
        width: 100%;
        min-width: 0;
        table-layout: fixed;
        border-collapse: collapse;
      }

      .tooltip-table th,
      .tooltip-table td {
        padding: 4px 6px;
        text-align: right;
        font-size: 12px;
        white-space: normal;
        overflow-wrap: anywhere;
      }

      .tooltip-table th:first-child,
      .tooltip-table td:first-child {
        text-align: left;
        padding-left: 0;
        width: 34%;
      }

      .tooltip-table th:last-child,
      .tooltip-table td:last-child {
        padding-right: 0;
      }

      .tooltip-table thead th {
        color: var(--muted);
        font-weight: 500;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      .tooltip-table tbody tr + tr td {
        border-top: 1px solid rgba(255, 255, 255, 0.04);
      }

      .tooltip-rarity {
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }

      .tooltip-rarity::before {
        content: "";
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--rarity-color, #888);
      }

      .map-card {
        width: 100%;
        text-align: left;
        cursor: pointer;
        min-height: 0;
        transition:
          transform 0.18s ease,
          border-color 0.18s ease,
          background 0.18s ease;
      }

      .map-card:hover {
        transform: translateY(-1px);
        border-color: rgba(125, 211, 252, 0.4);
      }

      .map-card.unavailable {
        cursor: not-allowed;
        opacity: 0.62;
        pointer-events: none;
        filter: saturate(0.75);
      }

      .map-card.unavailable:hover {
        transform: none;
        border-color: rgba(255, 255, 255, 0.06);
      }

      .map-card.selected {
        background: linear-gradient(
          135deg,
          rgba(125, 211, 252, 0.16),
          rgba(126, 224, 129, 0.1)
        );
        border-color: rgba(125, 211, 252, 0.55);
      }

      .map-card.best .map-card-price {
        color: var(--good);
      }

      .map-card-badges {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        align-self: center;
        flex-shrink: 0;
      }

      .map-card-weather {
        display: inline-flex;
        align-items: center;
        gap: 2px;
        min-height: 23px;
        padding: 1px 4px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        line-height: 1;
        position: relative;
      }

      .map-card-weather.is-expired {
        border-color: rgba(248, 113, 113, 0.95);
        box-shadow:
          0 0 0 1px rgba(248, 113, 113, 0.55),
          0 0 0 3px rgba(248, 113, 113, 0.12);
      }

      .map-card-weather.is-pending {
        background: linear-gradient(
          180deg,
          rgba(96, 165, 250, 0.18),
          rgba(255, 255, 255, 0.05)
        );
        border-color: rgba(96, 165, 250, 0.94);
        box-shadow:
          0 0 0 1px rgba(96, 165, 250, 0.52),
          0 0 0 3px rgba(96, 165, 250, 0.16);
      }

      .map-card-weather.is-pending .weather-step-btn {
        color: #b5d5ff;
      }

      .map-card-weather.is-pending .weather-step-btn:hover {
        background: rgba(96, 165, 250, 0.2);
        color: #ffffff;
      }

      .map-card-weather.is-pending .weather-emoji {
        filter: drop-shadow(0 0 6px rgba(96, 165, 250, 0.35));
      }

      .map-card-weather.is-gated-achievement {
        background: linear-gradient(
          180deg,
          rgba(248, 113, 113, 0.18),
          rgba(255, 255, 255, 0.05)
        );
        border-color: rgba(248, 113, 113, 0.92);
        box-shadow:
          0 0 0 1px rgba(248, 113, 113, 0.5),
          0 0 0 3px rgba(248, 113, 113, 0.14);
      }

      .map-card-weather.is-gated-achievement .weather-step-btn {
        color: #ffb0ba;
      }

      .map-card-weather.is-gated-achievement .weather-step-btn:hover {
        background: rgba(248, 113, 113, 0.2);
        color: #fff2f4;
      }

      .map-card-weather.is-gated-achievement .weather-emoji {
        filter: drop-shadow(0 0 6px rgba(255, 90, 103, 0.35));
      }

      .map-card-weather .tooltip {
        right: 0;
        left: auto;
        min-width: 0;
      }

      .weather-step-btn {
        width: 15px;
        height: 15px;
        border: none;
        border-radius: 999px;
        background: transparent;
        color: var(--muted);
        font-size: 12px;
        line-height: 1;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        transition:
          background 0.15s ease,
          color 0.15s ease;
      }

      .weather-step-btn:hover {
        background: rgba(125, 211, 252, 0.16);
        color: var(--text);
      }

      .weather-step-btn:focus-visible {
        outline: 2px solid rgba(125, 211, 252, 0.7);
        outline-offset: 2px;
      }

      .weather-emoji {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 15px;
        font-size: 13px;
      }

      .map-card-weather .tooltip [data-weather-elapsed].is-pending {
        color: #7db8ff;
        font-weight: 700;
      }

      .map-card-weather .tooltip .weather-tooltip-countdown {
        color: #4ade80;
        font-weight: 700;
      }

      .map-card-weather .tooltip .weather-tooltip-countdown.is-expired {
        color: #ff8f9a;
      }

      .weather-tooltip-warning {
        font-size: 12px;
        line-height: 1.45;
        margin-top: 2px;
      }

      .weather-tooltip-warning--error {
        color: #ff8f9a;
        font-weight: 700;
      }

      .map-card-badges .badge {
        margin-left: 0;
      }

      .badge,
      .badge-best,
      .best-row .badge {
        background: rgba(250, 204, 21, 0.15);
        color: #fbbf24;
        font-size: 11px;
        font-weight: 600;
      }

      .map-card-buff {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-top: 6px;
        color: var(--muted);
        font-size: 11px;
      }

      .map-card-buff-stepper {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: rgba(8, 11, 18, 0.9);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        padding: 2px;
      }

      .map-card-buff-stepper .stepper-btn {
        width: 22px;
        height: 22px;
        border-radius: 7px;
        border: none;
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        font-size: 13px;
        line-height: 1;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s ease;
      }

      .map-card-buff-stepper .stepper-btn:hover {
        background: rgba(125, 211, 252, 0.22);
      }

      .map-card-buff-stepper .stepper-btn:active {
        background: rgba(125, 211, 252, 0.34);
      }

      .map-card-buff-stepper .stepper-value {
        min-width: 36px;
        text-align: center;
        display: inline-block;
        font-size: 14px;
        font-weight: 900;
        color: var(--text);
        font-variant-numeric: tabular-nums;
        line-height: 1;
      }

      .map-card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }

      .map-card-title {
        display: flex;
        align-items: center;
        flex-wrap: nowrap;
        min-width: 0;
        font-size: 14px;
        font-weight: 700;
        line-height: 1.35;
      }

      .map-card-code {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        position: relative;
        margin-right: 8px;
        width: 26px;
        height: 26px;
        padding: 0;
        border-radius: 4px;
        background: rgba(185, 229, 255, 0.62);
        border: 1px solid rgba(205, 236, 255, 0.72);
        color: var(--text);
        font-size: 14px;
        font-weight: 900;
        line-height: 1;
        letter-spacing: 0;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.22);
      }

      .map-card-crown {
        position: absolute;
        top: -11px;
        left: -10px;
        z-index: 2;
        width: 24px;
        height: 22px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: help;
        line-height: 1;
      }

      .map-card-crown-icon {
        width: 22px;
        height: 19px;
        overflow: visible;
        fill: #facc15;
        stroke: rgba(254, 240, 138, 0.96);
        stroke-width: 1.35;
        stroke-linejoin: round;
        transform: rotate(-45deg);
        transform-origin: 50% 58%;
        filter: drop-shadow(0 2px 5px rgba(0, 0, 0, 0.42));
      }

      .map-card-crown .tooltip {
        left: -6px;
        right: auto;
        top: calc(100% + 6px);
        width: max-content;
        min-width: 52px;
        padding: 6px 8px;
        border-radius: 8px;
        color: var(--text);
        font-size: 12px;
        font-weight: 700;
        white-space: nowrap;
        text-align: center;
      }

      .map-card.selected:not(.best) .map-card-code {
        background: rgba(125, 211, 252, 0.98);
        border-color: rgba(180, 233, 255, 0.9);
        color: #0f172a;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.18);
      }

      .map-card.best .map-card-code {
        background: rgba(185, 229, 255, 0.62);
        border-color: rgba(205, 236, 255, 0.72);
        color: var(--text);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.22);
      }

      .map-card-price {
        font-size: 18px;
        font-weight: 700;
        margin-top: 10px;
      }

      .map-card.best .map-card-price {
        color: var(--good);
      }

      .map-card-note {
        margin-top: 4px;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.4;
      }

      .map-card-unavailable {
        margin-top: 10px;
        color: #ffd5dc;
        font-size: 12px;
        font-weight: 600;
      }

      .selected-map-delta-value {
        font-size: 1.15em;
        font-weight: 800;
        color: var(--text);
      }

      .selected-map-buff-value {
        font-size: 14px;
        font-weight: 900;
        color: var(--text);
        font-variant-numeric: tabular-nums;
      }

      .selected-best-net {
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        justify-content: flex-start;
        gap: 4px 18px;
      }

      .selected-best-net-item {
        display: inline-flex;
        align-items: baseline;
        gap: 4px;
        min-width: 0;
      }

      .selected-best-net-value {
        font-size: 14px;
        font-weight: 900;
        color: var(--text);
        font-variant-numeric: tabular-nums;
      }

      .map-card-best-bait {
        color: rgba(245, 251, 255, 0.8);
      }

      .map-card-compact {
        display: grid;
        gap: 6px;
      }

      .title-row,
      .panel-head,
      .section-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 14px;
      }

      aside.panel > .panel-head {
        position: relative;
        z-index: 5;
      }

      .title-row h2,
      .panel-head h2,
      .section-head h2 {
        font-size: 18px;
        flex: 0 0 auto;
        white-space: nowrap;
      }

      .panel-head-actions {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
        min-width: 0;
      }

      .refresh-nest-buff-actions {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        flex: 0 0 auto;
        justify-self: end;
      }

      .auto-nest-buff-help {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 16px;
        height: 16px;
        margin: 0;
        padding: 0;
        border: 0;
        background: transparent;
        color: var(--muted);
        font: inherit;
        line-height: 1;
        cursor: help;
        user-select: none;
        transition:
          color 0.15s ease,
          transform 0.15s ease;
      }

      .auto-nest-buff-help:hover {
        transform: translateY(-1px);
        color: var(--text);
      }

      .auto-nest-buff-help-icon {
        font-size: 14px;
        font-weight: 700;
        line-height: 1;
      }

      .auto-nest-buff-help .tooltip {
        left: 50%;
        right: auto;
        top: calc(100% + 8px);
        transform: translateX(-50%);
        z-index: 60;
        width: max-content;
        max-width: min(280px, calc(100vw - 24px));
        white-space: normal;
        background: #101521;
        backdrop-filter: none;
      }

      .refresh-nest-buff-statuses {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 6px 8px;
        align-items: center;
        justify-content: flex-start;
        min-width: 0;
        max-width: 100%;
        overflow: hidden;
      }

      .refresh-nest-buff-status {
        width: auto;
        min-width: 0;
        max-width: min(320px, 100%);
        padding: 4px 10px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.02);
        border-radius: 999px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
        box-shadow: none;
        text-align: left;
        white-space: normal;
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      .refresh-nest-buff-status.success {
        border-color: rgba(126, 224, 129, 0.22);
        background: rgba(126, 224, 129, 0.06);
        color: var(--good);
      }

      .refresh-nest-buff-status.error {
        border-color: rgba(255, 124, 145, 0.22);
        background: rgba(255, 124, 145, 0.06);
        color: #ffb8c2;
      }

      .refresh-nest-buff-status[hidden] {
        display: none;
      }

      .refresh-nest-buff-actions-row {
        align-items: center;
        gap: 10px;
      }

      .auto-nest-buff-switch {
        position: relative;
        display: inline-flex;
        align-items: center;
        gap: 9px;
        border: 1px solid rgba(125, 211, 252, 0.28);
        background: linear-gradient(
          135deg,
          rgba(125, 211, 252, 0.18),
          rgba(255, 255, 255, 0.05)
        );
        color: var(--text);
        border-radius: 999px;
        padding: 8px 12px 8px 9px;
        font: inherit;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        transition:
          transform 0.15s ease,
          border-color 0.15s ease,
          background 0.15s ease,
          opacity 0.15s ease;
        user-select: none;
      }

      .auto-nest-buff-switch:hover {
        transform: translateY(-1px);
        border-color: rgba(125, 211, 252, 0.48);
        background: linear-gradient(
          135deg,
          rgba(125, 211, 252, 0.24),
          rgba(255, 255, 255, 0.08)
        );
      }

      .auto-nest-buff-switch:active {
        transform: translateY(0);
      }

      .auto-nest-buff-switch.is-loading {
        opacity: 0.82;
      }

      .auto-nest-buff-switch input {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        margin: 0;
        opacity: 0;
        cursor: pointer;
      }

      .auto-nest-buff-switch-track {
        position: relative;
        flex: 0 0 auto;
        width: 34px;
        height: 20px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.16);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
        transition:
          background 0.15s ease,
          box-shadow 0.15s ease;
      }

      .auto-nest-buff-switch-track::after {
        content: "";
        position: absolute;
        top: 3px;
        left: 3px;
        width: 14px;
        height: 14px;
        border-radius: 999px;
        background: #fff;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.28);
        transition: transform 0.15s ease;
      }

      .auto-nest-buff-switch input:checked + .auto-nest-buff-switch-track {
        background: rgba(126, 224, 129, 0.48);
        box-shadow: inset 0 0 0 1px rgba(126, 224, 129, 0.26);
      }

      .auto-nest-buff-switch
        input:checked
        + .auto-nest-buff-switch-track::after {
        transform: translateX(14px);
      }

      .auto-nest-buff-switch
        input:focus-visible
        + .auto-nest-buff-switch-track {
        outline: 2px solid rgba(125, 211, 252, 0.7);
        outline-offset: 2px;
      }

      .auto-nest-buff-switch-text {
        white-space: nowrap;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border-radius: 999px;
        background: rgba(125, 211, 252, 0.1);
        color: var(--accent);
        padding: 8px 12px;
        font-size: 12px;
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .field.full {
        grid-column: 1 / -1;
      }

      .field input,
      .field select {
        width: 100%;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(8, 11, 18, 0.9);

        padding: 13px 14px;
        outline: none;
      }

      .player-qq-input-shell {

        align-items: center;
        gap: 8px;

        min-width: 0;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(8, 11, 18, 0.9);
      }

      .player-qq-input-shell input {
        flex: 1 1 10ch;
        min-width: 0;
        width: auto;
        border: 0;
        background: transparent;
      }

      .player-qq-input-shell.has-player-nickname input {
        padding-right: 0;
      }

      .player-qq-nickname {
        flex: 0 1 12em;
        min-width: 0;
        max-width: 44%;
        margin-right: 14px;
        overflow: hidden;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.2;
        text-align: right;
        text-overflow: ellipsis;
        white-space: nowrap;
        pointer-events: none;
        user-select: none;
      }

      .field input:focus,
      .field select:focus {
        border-color: rgba(125, 211, 252, 0.85);
      }

      .player-qq-input-shell:focus-within {
        border-color: rgba(125, 211, 252, 0.85);
      }

      .collection-setting {
        display: none;
        margin-top: 2px;
      }

      .field-label-badge {
        display: inline-flex;
        align-items: center;
        margin-left: 6px;
        padding: 2px 6px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
        vertical-align: middle;
      }

      .field-label-badge.manual {
        border-color: rgba(255, 204, 0, 0.24);
        background: rgba(255, 204, 0, 0.08);
        color: #facc15;
      }

      .field-label-with-help {
        display: inline-flex;
        align-items: center;
        gap: 3px;
        width: max-content;
        line-height: 1;
      }

      .field-label-help {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 16px;
        height: 16px;
        margin: 0;
        padding: 0;
        border: 0;
        background: transparent;
        color: var(--muted);

        line-height: 1;
        cursor: help;

          color 0.15s ease,
          transform 0.15s ease;
      }

      .field-label-help:hover {
        transform: translateY(-1px);
        color: var(--text);
      }

      .field-label-help-icon {
        font-size: 14px;
        font-weight: 700;
        line-height: 1;
      }

      .field-label-help .tooltip {
        left: 50%;

        top: calc(100% + 8px);
        transform: translateX(-50%);
        width: max-content;
        max-width: min(280px, calc(100vw - 24px));

        z-index: 60;
      }

      .player-location-panel {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 14px;
        border: 1px solid rgba(125, 211, 252, 0.22);

        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .player-location-panel + .player-location-panel {
        margin-top: 8px;
      }

      .player-location-panel[hidden] {
        display: none;
      }

      .player-location-label {
        white-space: nowrap;
      }

      .player-location-value {
        display: inline-flex;
        align-items: center;
        justify-content: flex-end;
        flex-wrap: wrap;
        gap: 5px;
        color: var(--text);
        font-weight: 900;
        text-align: right;
        overflow-wrap: anywhere;
      }

      .player-map-code {

        align-items: center;
        justify-content: center;
        flex: 0 0 auto;
        min-width: 20px;
        height: 20px;
        padding: 0 5px;
        border-radius: 4px;
        background: rgba(125, 211, 252, 0.98);
        border: 1px solid rgba(180, 233, 255, 0.9);

        font-size: 12px;
        font-weight: 900;
        line-height: 1;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.18);
      }

      .field-error {

        color: #ffb8c2;
        font-size: 12px;
        line-height: 1.45;
      }

      .field-error[hidden] {
        display: none;
      }

      .collection-open-btn {
        width: 100%;
        min-height: 45px;
        border: 1px solid rgba(125, 211, 252, 0.34);
        border-radius: 14px;
        background: linear-gradient(
          135deg,
          rgba(125, 211, 252, 0.2),
          rgba(126, 224, 129, 0.08)
        );
        color: var(--text);
        padding: 11px 13px;
        font: inherit;
        font-weight: 800;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        cursor: pointer;
        transition:
          transform 0.15s ease,
          border-color 0.15s ease,
          background 0.15s ease;
      }

      .collection-open-btn:hover {
        transform: translateY(-1px);
        border-color: rgba(125, 211, 252, 0.58);
        background: linear-gradient(
          135deg,
          rgba(125, 211, 252, 0.26),
          rgba(126, 224, 129, 0.12)
        );
      }

      .collection-open-btn:focus-visible {
        outline: 2px solid rgba(125, 211, 252, 0.75);
        outline-offset: 2px;
      }

      .collection-open-icon {
        display: inline-grid;
        grid-template-columns: repeat(2, 12px);
        grid-template-rows: repeat(2, 12px);
        gap: 3px;
        flex: 0 0 auto;
      }

      .collection-open-icon span {
        border-radius: 3px;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.24);
      }

      .collection-open-icon span:nth-child(1) {
        background: #ff4d1a;
      }

      .collection-open-icon span:nth-child(2) {
        background: #ffcc00;
      }

      .collection-open-icon span:nth-child(3) {
        background: #a44bff;
      }

      .collection-open-icon span:nth-child(4) {
        background: #3b82f6;
      }

      .collection-open-text {
        min-width: 0;
        flex: 1 1 auto;
        text-align: left;
      }

      .collection-progress {
        flex: 0 0 auto;
        color: rgba(237, 242, 255, 0.78);
        font-size: 12px;
        font-weight: 700;
        white-space: nowrap;
      }

      .helper {
        margin-top: 12px;
        font-size: 12px;
        line-height: 1.55;
      }

      .table-card {
        margin-top: 18px;
        padding: 0;
        overflow: hidden;
      }

      .table-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 20px 22px 14px;
      }

      .table-head h2 {
        font-size: 18px;
        margin-bottom: 6px;
      }

      .table-wrap {
        overflow: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 1120px;
      }

      thead th {
        position: sticky;
        top: 0;
        background: rgba(18, 22, 32, 0.98);
        color: #c9d4ea;
        text-align: left;
        font-size: 12px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        padding: 14px 16px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.09);
      }

      tbody td {
        padding: 15px 16px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }

      tbody tr:hover {
        background: rgba(255, 255, 255, 0.03);
      }

      td.net {
        color: var(--good);
        font-weight: 700;
      }

      .best-row {
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.1),
          rgba(183, 232, 255, 0.12)
        );
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.12),
          inset 0 -1px 0 rgba(255, 255, 255, 0.08);
      }

      .disabled-row {
        opacity: 0.55;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        padding: 4px 8px;
        border-radius: 999px;
        margin-left: 8px;
        background: rgba(255, 255, 255, 0.16);
        color: #f5fbff;
        font-size: 11px;
      }

      .best-row .badge {
        background: rgba(255, 255, 255, 0.22);
        color: #f5fbff;
      }

      .best-net {
        color: #f5fbff;
        font-weight: 800;
      }

      .bad {
        color: var(--bad);
      }

      .empty-state {
        padding: 24px 22px 28px;
        color: var(--muted);
      }

      body.collection-modal-open {
        overflow: hidden;
      }

      .collection-modal[hidden] {
        display: none;
      }

      .collection-modal {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: clamp(12px, 2.2vw, 28px);
      }

      .collection-modal-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(5, 8, 13, 0.72);
        backdrop-filter: blur(8px);
      }

      .collection-modal-panel {
        position: relative;
        z-index: 1;
        width: min(900px, calc(100vw - 48px));
        max-height: min(78vh, 800px);
        overflow: hidden;
        border-radius: 18px;
        background: linear-gradient(
          180deg,
          rgba(24, 30, 43, 0.97),
          rgba(13, 18, 28, 0.98)
        );
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: var(--text);
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.48);
        backdrop-filter: blur(18px);
        display: grid;
        grid-template-rows: auto auto auto minmax(0, 1fr);
      }

      .collection-modal-head {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 28px 58px 16px;
      }

      .collection-modal-title {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        font-size: clamp(26px, 3vw, 34px);
        line-height: 1.1;
        font-weight: 900;
        letter-spacing: 0;
      }

      .collection-title-icon {
        position: relative;
        width: 38px;
        height: 34px;
        flex: 0 0 auto;
      }

      .collection-title-icon span {
        position: absolute;
        width: 21px;
        height: 28px;
        border-radius: 3px;
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.26),
          0 3px 0 rgba(0, 0, 0, 0.22);
      }

      .collection-title-icon span:nth-child(1) {
        left: 3px;
        top: 0;
        background: #5ecb28;
      }

      .collection-title-icon span:nth-child(2) {
        left: 13px;
        top: 6px;
        background: #d91362;
      }

      .collection-title-icon span:nth-child(3) {
        left: 20px;
        top: 11px;
        background: #1ea7e1;
      }

      .collection-close-btn {
        position: absolute;
        right: 18px;
        top: 16px;
        width: 32px;
        height: 32px;
        border: none;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
        font-size: 22px;
        line-height: 1;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition:
          background 0.15s ease,
          transform 0.15s ease;
      }

      .collection-close-btn:hover {
        transform: translateY(-1px);
        background: rgba(255, 255, 255, 0.14);
      }

      .collection-close-btn:focus-visible {
        outline: 3px solid rgba(59, 130, 246, 0.38);
        outline-offset: 2px;
      }

      .collection-legend {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
        gap: 14px;
        padding: 4px 24px 18px;
        color: var(--muted);
        font-size: 15px;
        line-height: 1;
      }

      .collection-legend-item {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-weight: 700;
      }

      .collection-legend-dot {
        width: 15px;
        height: 15px;
        border-radius: 50%;
        background: var(--rarity-color);
      }

      .collection-note {
        margin: 0 28px 16px;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid rgba(125, 211, 252, 0.2);
        background: rgba(125, 211, 252, 0.08);
        color: rgba(237, 242, 255, 0.82);
        font-size: 13px;
        line-height: 1.55;
        text-align: center;
      }

      .collection-body {
        min-height: 0;
        overflow: auto;
        padding: 0 28px 30px;
      }

      .collection-map-list {
        display: grid;
        gap: 8px;
      }

      .collection-map-row {
        display: grid;
        grid-template-columns: 150px minmax(0, 1fr);
        align-items: stretch;
        min-height: 62px;
        border-radius: 9px;
        background: rgba(255, 255, 255, 0.045);
        border: 1px solid rgba(255, 255, 255, 0.06);
        overflow: hidden;
      }

      .collection-map-name {
        display: flex;
        align-items: center;
        padding: 13px 14px 13px 20px;
        border-left: 6px solid rgba(125, 211, 252, 0.95);
        background: rgba(125, 211, 252, 0.05);
        color: var(--text);
        font-size: 18px;
        font-weight: 900;
        line-height: 1.18;
      }

      .collection-fish-grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));

        padding: 8px;

      .collection-fish-card {
        min-width: 0;
        min-height: 46px;
        border-radius: 7px;
        background: rgba(255, 255, 255, 0.055);
        border: 1px solid rgba(255, 255, 255, 0.045);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 6px 7px;
      }

      .collection-fish-name {
        max-width: 100%;
        color: var(--text);
        font-size: 15px;
        font-weight: 900;
        line-height: 1.15;
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .collection-rarity-dots {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
      }

      .collection-rarity-dot {
        appearance: none;
        width: 13px;
        height: 13px;
        border: 2px solid rgba(237, 242, 255, 0.34);
        border-radius: 50%;
        background: transparent;
        padding: 0;
        flex: 0 0 auto;
        cursor: pointer;
        touch-action: none;
        transition:
          transform 0.12s ease,
          background 0.12s ease,
          border-color 0.12s ease,
          box-shadow 0.12s ease;
      }

      .collection-rarity-dot:hover {
        transform: scale(1.12);
        border-color: var(--rarity-color);
      }

      .collection-rarity-dot:focus-visible {
        outline: 3px solid rgba(59, 130, 246, 0.28);
        outline-offset: 2px;
      }

      .collection-rarity-dot.is-collected {
        background: var(--rarity-color);

      }

      .collection-rarity-dot.is-drag-source {
        box-shadow: 0 0 0 5px rgba(59, 130, 246, 0.16);
      }

      @media (max-width: 820px) {
        .hero,
        .hero-metrics,
        .controls {
          grid-template-columns: 1fr;
        }

        .page {
          width: min(100vw - 20px, 1320px);
          padding-top: 16px;
        }

        .hero-copy,
        .panel,
        .section {
          padding: 18px;
        }

        .table-head {

          align-items: flex-start;

          padding: 10px;
          align-items: center;

        .collection-modal-panel {
          width: min(640px, calc(100vw - 48px));

        .collection-modal-head {
          padding: 24px 46px 14px;
        }

        .collection-close-btn {
          right: 16px;

        .collection-legend {
          gap: 12px;
          padding-bottom: 16px;
          font-size: 14px;
        }

        .collection-legend-dot {

          height: 14px;
        }

        .collection-body {

        .collection-note {

          grid-template-columns: 1fr;

          grid-template-columns: repeat(2, minmax(0, 1fr));

          font-size: 14px;
        }

      @media (max-width: 520px) {

          gap: 6px;

        .player-qq-nickname {
          flex-basis: 36%;
          max-width: 36%;
          margin-right: 10px;

          align-items: flex-start;
          flex-direction: column;
        }

          gap: 10px;

          width: 34px;
          height: 30px;
        }

        .collection-title-icon span {
          width: 19px;
          height: 25px;
        }
      }

  </head>
  <body>
    <main class="page">
      <section class="hero">
        <article class="card hero-copy">
          <div class="eyebrow">
            Fishing Calculator
            <span class="version-badge" id="versionBadge">v1.1.5</span>
          </div>
          <h1>钓鱼收益计算器</h1>

          <div class="panel hero-params" style="margin-top: 18px">
            <div class="panel-head">
              <h2>原始计算参数</h2>
            </div>

            <div class="controls">
              <div class="field full">
                <label for="hookLevel">鱼钩等级</label>
                <select id="hookLevel"></select>
              </div>
              <div class="field full">
                <label for="rodLevel">鱼竿等级</label>
                <select id="rodLevel"></select>
              </div>
              <div class="field full">
                <label for="systemBuff"
                  >系统 buff
                  <span class="field-label-badge manual">手动</span></label
                >
                <select id="systemBuff"></select>
              </div>
              <div class="field full">
                <label for="playerQQ" class="field-label-with-help"
                  >QQ 号
                  <span
                    class="field-label-help has-tooltip"
                    aria-label="QQ 号说明"
                    ><span class="field-label-help-icon" aria-hidden="true"
                      >ⓘ</span
                    ><span class="tooltip"
                      >自动更新数据时，如果玩家填写了qq号，则可以自动更新鱼钩等级、鱼竿等级</span
                    ></span
                  ></label
                >
                <div class="player-qq-input-shell">
                  <input
                    id="playerQQ"
                    inputmode="numeric"
                    autocomplete="off"
                    placeholder="填写后自动同步鱼钩 / 鱼竿等级"
                  />
                  <span
                    id="playerQQNickname"
                    class="player-qq-nickname"
                    hidden
                    aria-hidden="true"
                  ></span>
                </div>
                <div class="field-error" id="playerQQError" hidden></div>
              </div>
              <div class="field full">
                <div
                  class="player-location-panel"
                  id="playerLocationPanel"
                  hidden
                >
                  <span class="player-location-label">玩家当前地图</span>
                  <span class="player-location-value" id="playerLocationValue"
                    >-</span
                  >
                </div>
                <div class="player-location-panel" id="playerBaitPanel" hidden>
                  <span class="player-location-label">玩家当前鱼饵</span>
                  <span class="player-location-value" id="playerBaitValue"
                    >-</span
                  >
                </div>
              </div>
              <div class="field full collection-setting" hidden>
                <label for="openCollectionModal">图鉴设置</label>
                <button
                  type="button"
                  class="collection-open-btn"
                  id="openCollectionModal"
                >
                  <span class="collection-open-icon" aria-hidden="true">
                    <span></span>
                    <span></span>
                    <span></span>
                    <span></span>
                  </span>
                  <span class="collection-open-text">打开钓鱼图鉴</span>
                  <span class="collection-progress" id="collectionProgress"
                    >-</span
                  >
                </button>
              </div>
            </div>
          </div>
        </article>

        <aside class="card panel">
          <div class="panel-head">
            <h2>地图选择</h2>
            <div class="panel-head-actions">
              <div class="refresh-nest-buff-statuses">
                <div
                  class="refresh-nest-buff-status"
                  id="refreshNestBuffStatus"
                  hidden
                ></div>
                <div
                  class="refresh-nest-buff-status error"
                  id="refreshNestBuffError"
                  hidden
                ></div>
              </div>
              <div class="refresh-nest-buff-actions">
                <label class="auto-nest-buff-switch">
                  <input
                    type="checkbox"
                    id="autoNestBuffSwitch"
                    role="switch"
                    aria-label="自动更新数据"
                  />
                  <span
                    class="auto-nest-buff-switch-track"
                    aria-hidden="true"
                  ></span>
                  <span class="auto-nest-buff-switch-text">自动更新数据</span>
                </label>
                <span
                  class="auto-nest-buff-help has-tooltip"
                  aria-label="地图数据说明"
                >
                  <span class="auto-nest-buff-help-icon" aria-hidden="true"
                    >ⓘ</span
                  >
                  <span class="tooltip"
                    >自动数据包括打窝 buff、天气；填写 QQ
                    后同步鱼钩和鱼竿等级</span
                  >
                </span>
              </div>
            </div>
          </div>
          <div class="map-grid" id="mapCardList"></div>
        </aside>
      </section>

      <section class="summary">
        <article class="summary-card">
          <div class="label">当前地图</div>
          <div class="value" id="selectedMapName">-</div>
          <div class="small" id="selectedMapDelta">-</div>
        </article>
        <article class="summary-card has-tooltip" id="fishPriceCard">
          <div class="label">当前单鱼期望价值</div>
          <div class="value" id="selectedFishPrice">-</div>
          <div class="small" id="selectedMapProbability">-</div>
          <div class="tooltip" id="fishPriceTooltip" hidden></div>
        </article>
        <article class="summary-card">
          <div class="label">当前最优鱼饵</div>
          <div class="value" id="selectedBestBait">-</div>
          <div class="small" id="selectedBestNet">-</div>
        </article>
      </section>

      <section class="card section table-card">
        <div class="table-head">
          <h2>鱼饵收益对比</h2>
          <div class="muted">
            最佳鱼饵：<strong id="bestBaitName">-</strong> / 24h 净收益
            <strong id="bestBaitNet">-</strong>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>鱼饵</th>
                <th>价格</th>
                <th>加速</th>
                <th>钓鱼间隔</th>
                <th>24h 理论次数</th>
                <th>1H 理论收入</th>
                <th>24h 总收益</th>
                <th>24h 鱼饵成本</th>
                <th>24h 净收益</th>
              </tr>
            </thead>
            <tbody id="resultBody"></tbody>
          </table>
        </div>
        <div class="empty-state" id="emptyState" hidden>
          <span>暂无可计算的鱼饵数据，请检查配置文件。</span>
        </div>
      </section>
    </main>

    <div class="collection-modal" id="collectionModal" hidden>
      <div
        class="collection-modal-backdrop"
        data-collection-close
        aria-hidden="true"
      ></div>
      <section
        class="collection-modal-panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="collectionModalTitle"
        tabindex="-1"
      >
        <header class="collection-modal-head">
          <h2 class="collection-modal-title" id="collectionModalTitle">
            <span class="collection-title-icon" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </span>
            钓鱼图鉴
          </h2>
          <button
            type="button"
            class="collection-close-btn"
            data-collection-close
            aria-label="关闭图鉴"
          >
            ×
          </button>
        </header>
        <div class="collection-legend" id="collectionLegend"></div>
        <p class="collection-note">
          图鉴收集完整度会触发某些特殊效果，请保证图鉴准确才能计算出真实利润哦😉
        </p>
        <div class="collection-body">
          <div class="collection-map-list" id="collectionMapList"></div>
        </div>
      </section>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
