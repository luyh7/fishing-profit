name: Sync Nest Buff Data

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "sync-nest-buff"
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Switch to gh-pages branch
        shell: bash
        run: |
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages:gh-pages
            git switch gh-pages
            git reset --hard origin/gh-pages
          else
            git switch --orphan gh-pages
          fi

      - name: Fetch nest buff data
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const sourceUrl = 'http://223.109.140.105:4158/';

          async function main() {
            const response = await fetch(sourceUrl, { cache: 'no-store' });
            if (!response.ok) {
              throw new Error(`HTTP ${response.status}`);
            }

            const payload = await response.json();
            if (!payload || typeof payload !== 'object' || !Array.isArray(payload.locations)) {
              throw new Error('Unexpected payload shape: expected an object with a locations array');
            }

            const serialized = JSON.stringify(payload, null, 2) + '\n';
            fs.writeFileSync('nest-buff.json', serialized, 'utf8');
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Commit changes
        shell: bash
        run: |
          if git diff --quiet -- nest-buff.json; then
            echo "No changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add nest-buff.json
          git commit -m "chore: sync nest buff data"
          git push origin gh-pages
